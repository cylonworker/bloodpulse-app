name: Mobile Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to Appetize
        env:
          APPETIZE_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $APPETIZE_TOKEN" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk" \
            -F "platform=android" \
            -F "notes=BloodPulse - Build ${{ github.run_number }}" \
            https://api.appetize.io/v1/apps | tee appetize-response.json
          
          PUBLIC_URL=$(jq -r '.publicURL // empty' appetize-response.json)
          if [ -n "$PUBLIC_URL" ]; then
            echo "::notice::🌐 Live demo: $PUBLIC_URL"
            echo "appetize_url=$PUBLIC_URL" >> $GITHUB_OUTPUT
          fi
