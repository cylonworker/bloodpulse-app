name: bloodpulse
description: "BloodPulse - Blood Pressure Monitor App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Database & Auth
  supabase_flutter: ^2.8.0
  hive_flutter: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.17
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.70.2

  # PDF & Sharing
  pdf: ^3.11.2
  share_plus: ^10.1.4

  # Utils
  uuid: ^4.5.1
  get_it: ^8.0.3

  # Deep Links for OAuth callbacks
  uni_links: ^0.5.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/